<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖 문장 아카이브</title>
    <meta name="google-site-verification" content="RGTC9c8GtMgvT1HtDz5vzgXPGl9f-DSDOq1lCW95In8" />
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
</head>
<body>

<a href="https://hwiruruk.github.io/readinglab/" 
   title="Reading Lab 메인으로 돌아가기"
   style="position: fixed; top: 20px; right: 20px; width: 60px; height: 60px; z-index: 9999; cursor: pointer; transition: transform 0.2s;"
   onmouseover="this.style.transform='translate(-2px, -2px) scale(1.05)'"
   onmouseout="this.style.transform='translate(0, 0) scale(1)'">
    <svg viewBox="0 0 100 100" style="width: 100%; height: 100%; filter: drop-shadow(4px 4px 0px rgba(0,0,0,1));">
        <rect x="10" y="60" width="70" height="25" fill="#FFFFFF" stroke="black" stroke-width="4" />
        <rect x="15" y="38" width="75" height="22" fill="#93B6CC" stroke="black" stroke-width="4" />
        <rect x="25" y="15" width="60" height="23" fill="#903B31" stroke="black" stroke-width="4" />
        <line x1="10" y1="72" x2="80" y2="72" stroke="black" stroke-width="3" />
        <line x1="15" y1="49" x2="90" y2="49" stroke="black" stroke-width="3" />
    </svg>
</a>
    
<div class="container">
    <div id="canvas-wrapper">
        <canvas id="storyCanvas" width="1080" height="1920"></canvas>
    </div>
    <div class="controls">
        <h2>문장 아카이브</h2>
        <div class="group">
            <label>책 검색</label>
            <input type="text" id="bookSearch" placeholder="제목/저자 입력 후 엔터" onkeypress="if(event.keyCode==13) searchBook()">
            <div id="search-results"></div>
        </div>
        <div class="group">
            <label>문장 입력</label>
            <textarea id="textInput" oninput="draw()"></textarea>
        </div>
        <div class="group">
            <label>글자 상하 위치 조절</label>
            <input type="range" id="textYPos" min="0.2" max="0.8" step="0.01" value="0.5" oninput="draw()">
        </div>
        <div class="group">
            <label>줄 간격 조절 (<span id="lineHeightVal">1.6</span>)</label>
            <input type="range" id="lineHeightRange" min="1.0" max="2.5" step="0.1" value="1.6" oninput="updateLineHeight(this.value)">
        </div>
        <div class="group">
            <label>폰트 및 크기 (<span id="fontSizeVal">90</span>px)</label>
            <div style="display: flex; gap: 8px;">
                <select id="fontSelect" onchange="draw()" style="flex: 1;">
                    <option value="'Nanum Myeongjo', serif">나눔명조</option>
                    <option value="'Nanum Pen Script', cursive">나눔펜글씨</option>
                    <option value="'Apple SD Gothic Neo', sans-serif">고딕 (기본)</option>
                </select>
                <input type="range" id="fontSizeRange" min="30" max="200" value="90" oninput="updateFontSize(this.value)" style="flex: 1;">
            </div>
        </div>
        <div class="group">
            <label>책 정보 수정</label>
            <div style="display: flex; flex-direction: column; gap: 8px;">
                <textarea id="bookTitleInput" placeholder="책 제목" oninput="draw()" style="min-height: 60px;"></textarea>
                <input type="text" id="bookAuthorInput" placeholder="저자" oninput="draw()">
            </div>
        </div>
        <div class="color-grid">
            <div class="color-item">
                <label>배경1</label>
                <div class="color-input-wrapper">
                    <input type="color" id="color1" value="#667eea" onchange="draw()">
                    <button class="btn-mini" onclick="setSingleColor()">단색</button>
                </div>
            </div>
            <div class="color-item">
                <label>배경2</label>
                <div class="color-input-wrapper">
                    <input type="color" id="color2" value="#764ba2" onchange="draw()">
                    <button class="btn-mini" onclick="applyPalette()">🎨 맞춤</button>
                </div>
            </div>
            <div class="color-item">
                <label>글자색</label>
                <div class="color-input-wrapper">
                    <input type="color" id="textColor" value="#ffffff" onchange="draw()">
                </div>
            </div>
        </div>
        <button class="btn-download" onclick="downloadImage()">이미지 저장하기</button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
