<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖 문장 아카이브</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <div id="canvas-wrapper">
        <canvas id="storyCanvas" width="1080" height="1920"></canvas>
    </div>
    <div class="controls">
        <h2>문장 아카이브</h2>
        <div class="group">
            <label>책 검색</label>
            <input type="text" id="bookSearch" placeholder="제목/저자 입력 후 엔터" onkeypress="if(event.keyCode==13) searchBook()">
            <div id="search-results"></div>
        </div>
        <div class="group">
            <label>문장 입력</label>
            <textarea id="textInput" oninput="draw()">"모든 위대한 것들은 단순하다."</textarea>
        </div>
        <div class="group">
            <label>글자 상하 위치 조절</label>
            <input type="range" id="textYPos" min="0.2" max="0.8" step="0.01" value="0.5" oninput="draw()">
        </div>
        <div class="group">
            <label>줄 간격 조절 (<span id="lineHeightVal">1.6</span>)</label>
            <input type="range" id="lineHeightRange" min="1.0" max="2.5" step="0.1" value="1.6" oninput="updateLineHeight(this.value)">
        </div>
        <div class="group">
            <label>폰트 및 크기 (<span id="fontSizeVal">90</span>px)</label>
            <div style="display: flex; gap: 8px;">
                <select id="fontSelect" onchange="draw()" style="flex: 1;">
                    <option value="'Nanum Myeongjo', serif">나눔명조</option>
                    <option value="'Nanum Pen Script', cursive">나눔펜글씨</option>
                    <option value="'Apple SD Gothic Neo', sans-serif">고딕 (기본)</option>
                </select>
                <input type="range" id="fontSizeRange" min="30" max="200" value="90" oninput="updateFontSize(this.value)" style="flex: 1;">
            </div>
        </div>
        <div class="group">
            <label>책 정보 수정</label>
            <div style="display: flex; flex-direction: column; gap: 8px;">
                <textarea id="bookTitleInput" placeholder="책 제목" oninput="draw()" style="min-height: 60px;"></textarea>
                <input type="text" id="bookAuthorInput" placeholder="저자" oninput="draw()">
            </div>
        </div>
        <div class="color-grid">
            <div class="color-item">
                <label>배경1</label>
                <div class="color-input-wrapper">
                    <input type="color" id="color1" value="#667eea" onchange="draw()">
                    <button class="btn-mini" onclick="setSingleColor()">단색</button>
                </div>
            </div>
            <div class="color-item">
                <label>배경2</label>
                <div class="color-input-wrapper">
                    <input type="color" id="color2" value="#764ba2" onchange="draw()">
                    <button class="btn-mini" onclick="applyPalette()">🎨 맞춤</button>
                </div>
            </div>
            <div class="color-item">
                <label>글자색</label>
                <div class="color-input-wrapper">
                    <input type="color" id="textColor" value="#ffffff" onchange="draw()">
                </div>
            </div>
        </div>
        <button class="btn-download" onclick="downloadImage()">이미지 저장하기</button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
